<!DOCTYPE html>
<html lang="es">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
 <title>Calculadora CI/CD</title>
 <style>
 body { font-family: Arial, sans-serif; max-width: 420px;
 margin: 60px auto; padding: 20px; }
 h1 { text-align: center; color: #0f3460; }
 label, select, input, button { display: block; width: 100%;
 margin-bottom: 12px; font-size: 1rem; }
 button { background: #0f3460; color: #fff; border: none;
 padding: 10px; cursor: pointer; border-radius: 4px; }
 #result { font-size: 1.4rem; text-align: center;
 color: #16213e; margin-top: 16px; }
 </style>
</head>
<body>
 <h1>Calculadora</h1>
 <label for="a">Valor A:</label>
 <input type="number" id="a" value="0" />
 <label for="op">Operación:</label>
 <select id="op">
 <option value="add">Suma (+)</option>
 <option value="sub">Resta (-)</option>
 <option value="mul">Multiplicacion (x)</option>
 <option value="div">Division (/)</option>
 </select>
 <label for="b">Valor B:</label>
 <input type="number" id="b" value="0" />
 <button onclick="calculate()">Calcular</button>
 <div id="result"></div>
 <script type="module">
 import { sum } from "./sum.js";
 import { subtract } from "./subtract.js";
 import { multiply } from "./multiply.js";
 import { divide } from "./divide.js";
 window.calculate = function () {
 const a = parseFloat(document.getElementById("a").value);
 const b = parseFloat(document.getElementById("b").value);
 const op = document.getElementById("op").value;
 let result;
 try {
 if (op === "add") result = sum(a, b);
 else if (op === "sub") result = subtract(a, b);
 else if (op === "mul") result = multiply(a, b);
 else result = divide(a, b);
 document.getElementById("result").textContent =
 "Resultado: " + result;
 } catch (err) {
 document.getElementById("result").textContent =
 "Error: " + err.message;
 }
 };
 </script>
</body>
</html>
